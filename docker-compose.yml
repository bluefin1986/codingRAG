services:
  app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    image: ${CODINGRAG_IMAGE:-codingrag:latest}
    container_name: ${CODINGRAG_CONTAINER_NAME:-codingrag-app}
    ports:
      - "${CODINGRAG_HTTP_PORT:-8060}:8060"
    environment:
      CODING_RAG_PRELOAD_DOMAINS: ${CODING_RAG_PRELOAD_DOMAINS:-}
      CODING_RAG_AIMODELS_API_BASE: ${CODING_RAG_AIMODELS_API_BASE:-http://10.63.3.80:8030}
      CODING_RAG_QDRANT_HOST: qdrant
      CODING_RAG_QDRANT_PORT: "6333"
      CODING_RAG_QDRANT_API_KEY: ${QDRANT_API_KEY:-codingrag-qdrant-secret}
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    platform: linux/amd64
    image: qdrant/qdrant:v1.15.3
    container_name: ${QDRANT_CONTAINER_NAME:-codingrag-qdrant}
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-codingrag-qdrant-secret}
    volumes:
      - ${QDRANT_STORAGE_DIR:-./data/qdrant}:/qdrant/storage
    restart: unless-stopped
