services:
  app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-${HTTP_PROXY:-}}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-${HTTPS_PROXY:-}}
        NO_PROXY: ${BUILD_NO_PROXY:-${NO_PROXY:-}}
    image: ${CODINGRAG_IMAGE:-codingrag:latest}
    container_name: ${CODINGRAG_CONTAINER_NAME:-codingrag-app}
    ports:
      - "${CODINGRAG_HTTP_PORT:-8060}:8060"
    environment:
      CODING_RAG_PRELOAD_DOMAINS: ${CODING_RAG_PRELOAD_DOMAINS:-}
      CODING_RAG_AIMODELS_API_BASE: ${CODING_RAG_AIMODELS_API_BASE:-http://10.63.3.80:8030}
      CODING_RAG_QDRANT_HOST: qdrant
      CODING_RAG_QDRANT_PORT: "6333"
      CODING_RAG_QDRANT_API_KEY: ${QDRANT_API_KEY:-codingrag-qdrant-secret}
      CODING_RAG_KEYWORD_BACKEND: ${CODING_RAG_KEYWORD_BACKEND:-opensearch}
      CODING_RAG_ES_URL: ${CODING_RAG_ES_URL:-http://opensearch:9200}
      CODING_RAG_ES_API_KEY: ${CODING_RAG_ES_API_KEY:-}
      CODING_RAG_ES_INDEX_HARMONYOS: ${CODING_RAG_ES_INDEX_HARMONYOS:-codingrag_harmonyos_docs}
      CODING_RAG_ES_INDEX_IOS: ${CODING_RAG_ES_INDEX_IOS:-codingrag_ios_docs}
      CODING_RAG_DATABASE_URL: ${CODING_RAG_DATABASE_URL:-postgresql://codingrag:codingrag@postgres:5432/codingrag}
      CODING_RAG_STORAGE_BACKEND: ${CODING_RAG_STORAGE_BACKEND:-seaweedfs}
      CODING_RAG_SEAWEEDFS_FILER_URL: ${CODING_RAG_SEAWEEDFS_FILER_URL:-http://seaweedfs-filer:8888}
      CODING_RAG_SEAWEEDFS_PUBLIC_BASE_URL: ${CODING_RAG_SEAWEEDFS_PUBLIC_BASE_URL:-http://seaweedfs-filer:8888}
      CODING_RAG_SEAWEEDFS_BUCKET: ${CODING_RAG_SEAWEEDFS_BUCKET:-codingrag-originals}
      CODING_RAG_SEAWEEDFS_KEY_PREFIX: ${CODING_RAG_SEAWEEDFS_KEY_PREFIX:-libraries}
      CODING_RAG_SEAWEEDFS_S3_ENDPOINT: ${CODING_RAG_SEAWEEDFS_S3_ENDPOINT:-http://seaweedfs-filer:8333}
      CODING_RAG_IMPORT_BATCH_SIZE: ${CODING_RAG_IMPORT_BATCH_SIZE:-100}
    depends_on:
      - qdrant
      - opensearch
      - postgres
      - seaweedfs-filer
    volumes:
      - ${CODING_RAG_INGEST_STAGING_DIR:-./data/ingest-jobs}:/app/output/ingest-jobs
    restart: unless-stopped

  library-import-worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-${HTTP_PROXY:-}}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-${HTTPS_PROXY:-}}
        NO_PROXY: ${BUILD_NO_PROXY:-${NO_PROXY:-}}
    image: ${CODINGRAG_IMPORT_WORKER_IMAGE:-codingrag-library-import-worker:latest}
    container_name: ${CODINGRAG_IMPORT_WORKER_CONTAINER_NAME:-codingrag-library-import-worker}
    command: python3 scripts/library_import_worker.py
    environment:
      CODING_RAG_DATABASE_URL: ${CODING_RAG_DATABASE_URL:-postgresql://codingrag:codingrag@postgres:5432/codingrag}
      CODING_RAG_STORAGE_BACKEND: ${CODING_RAG_STORAGE_BACKEND:-seaweedfs}
      CODING_RAG_SEAWEEDFS_FILER_URL: ${CODING_RAG_SEAWEEDFS_FILER_URL:-http://seaweedfs-filer:8888}
      CODING_RAG_SEAWEEDFS_PUBLIC_BASE_URL: ${CODING_RAG_SEAWEEDFS_PUBLIC_BASE_URL:-http://seaweedfs-filer:8888}
      CODING_RAG_SEAWEEDFS_BUCKET: ${CODING_RAG_SEAWEEDFS_BUCKET:-codingrag-originals}
      CODING_RAG_SEAWEEDFS_KEY_PREFIX: ${CODING_RAG_SEAWEEDFS_KEY_PREFIX:-libraries}
      CODING_RAG_SEAWEEDFS_S3_ENDPOINT: ${CODING_RAG_SEAWEEDFS_S3_ENDPOINT:-http://seaweedfs-filer:8333}
      CODING_RAG_IMPORT_BATCH_SIZE: ${CODING_RAG_IMPORT_BATCH_SIZE:-100}
    depends_on:
      - postgres
      - seaweedfs-filer
    volumes:
      - ${CODING_RAG_INGEST_STAGING_DIR:-./data/ingest-jobs}:/app/output/ingest-jobs:ro
    restart: unless-stopped

  reindex-worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-${HTTP_PROXY:-}}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-${HTTPS_PROXY:-}}
        NO_PROXY: ${BUILD_NO_PROXY:-${NO_PROXY:-}}
    image: ${CODINGRAG_REINDEX_WORKER_IMAGE:-codingrag-reindex-worker:latest}
    container_name: ${CODINGRAG_REINDEX_WORKER_CONTAINER_NAME:-codingrag-reindex-worker}
    command: python3 scripts/reindex_worker.py
    environment:
      CODING_RAG_DATABASE_URL: ${CODING_RAG_DATABASE_URL:-postgresql://codingrag:codingrag@postgres:5432/codingrag}
      CODING_RAG_AIMODELS_API_BASE: ${CODING_RAG_AIMODELS_API_BASE:-http://10.63.3.80:8030}
      CODING_RAG_QDRANT_HOST: qdrant
      CODING_RAG_QDRANT_PORT: "6333"
      CODING_RAG_QDRANT_API_KEY: ${QDRANT_API_KEY:-codingrag-qdrant-secret}
      CODING_RAG_KEYWORD_BACKEND: ${CODING_RAG_KEYWORD_BACKEND:-opensearch}
      CODING_RAG_ES_URL: ${CODING_RAG_ES_URL:-http://opensearch:9200}
      CODING_RAG_ES_API_KEY: ${CODING_RAG_ES_API_KEY:-}
      CODING_RAG_STORAGE_BACKEND: ${CODING_RAG_STORAGE_BACKEND:-seaweedfs}
      CODING_RAG_SEAWEEDFS_FILER_URL: ${CODING_RAG_SEAWEEDFS_FILER_URL:-http://seaweedfs-filer:8888}
    depends_on:
      - postgres
      - qdrant
      - opensearch
      - seaweedfs-filer
    restart: unless-stopped

  postgres:
    platform: linux/amd64
    image: ${POSTGRES_IMAGE:-postgres:16.9-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-codingrag-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codingrag}
      POSTGRES_USER: ${POSTGRES_USER:-codingrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codingrag}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    restart: unless-stopped

  seaweedfs-master:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:latest}
    container_name: ${SEAWEEDFS_MASTER_CONTAINER_NAME:-codingrag-seaweedfs-master}
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0"
    ports:
      - "${SEAWEEDFS_MASTER_PORT:-9333}:9333"
    volumes:
      - ${SEAWEEDFS_MASTER_DATA_DIR:-./data/seaweedfs/master}:/data
    restart: unless-stopped

  seaweedfs-volume:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:latest}
    container_name: ${SEAWEEDFS_VOLUME_CONTAINER_NAME:-codingrag-seaweedfs-volume}
    command: "volume -mserver=seaweedfs-master:9333 -ip=seaweedfs-volume -ip.bind=0.0.0.0 -dir=/data -max=${SEAWEEDFS_VOLUME_MAX:-7}"
    ports:
      - "${SEAWEEDFS_VOLUME_PORT:-8080}:8080"
    volumes:
      - ${SEAWEEDFS_VOLUME_DATA_DIR:-./data/seaweedfs/volume}:/data
    depends_on:
      - seaweedfs-master
    restart: unless-stopped

  seaweedfs-filer:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:latest}
    container_name: ${SEAWEEDFS_FILER_CONTAINER_NAME:-codingrag-seaweedfs-filer}
    command: "filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer -ip.bind=0.0.0.0 -s3 -s3.port=8333"
    ports:
      - "${SEAWEEDFS_FILER_PORT:-8888}:8888"
      - "${SEAWEEDFS_S3_PORT:-8333}:8333"
    volumes:
      - ${SEAWEEDFS_FILER_DATA_DIR:-./data/seaweedfs/filer}:/data
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    restart: unless-stopped

  qdrant:
    platform: linux/amd64
    image: qdrant/qdrant:v1.15.3
    container_name: ${QDRANT_CONTAINER_NAME:-codingrag-qdrant}
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-codingrag-qdrant-secret}
    volumes:
      - ${QDRANT_STORAGE_DIR:-./data/qdrant}:/qdrant/storage
    restart: unless-stopped

  opensearch:
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/opensearch/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    image: ${OPENSEARCH_IMAGE:-codingrag-opensearch-ik:2.19.1}
    container_name: ${OPENSEARCH_CONTAINER_NAME:-codingrag-opensearch}
    ports:
      - "${OPENSEARCH_HTTP_PORT:-9200}:9200"
      - "${OPENSEARCH_PERF_PORT:-9600}:9600"
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${OPENSEARCH_DATA_DIR:-./data/opensearch}:/usr/share/opensearch/data
    restart: unless-stopped
