services:
  app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-${HTTP_PROXY:-}}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-${HTTPS_PROXY:-}}
        NO_PROXY: ${BUILD_NO_PROXY:-${NO_PROXY:-}}
    image: ${CODINGRAG_IMAGE:-codingrag:latest}
    container_name: ${CODINGRAG_CONTAINER_NAME:-codingrag-app}
    ports:
      - "${CODINGRAG_HTTP_PORT:-8060}:8060"
    environment:
      CODING_RAG_PRELOAD_DOMAINS: ${CODING_RAG_PRELOAD_DOMAINS:-}
      CODING_RAG_AIMODELS_API_BASE: ${CODING_RAG_AIMODELS_API_BASE:-http://10.63.3.80:8030}
      CODING_RAG_QDRANT_HOST: qdrant
      CODING_RAG_QDRANT_PORT: "6333"
      CODING_RAG_QDRANT_API_KEY: ${QDRANT_API_KEY:-codingrag-qdrant-secret}
      CODING_RAG_KEYWORD_BACKEND: ${CODING_RAG_KEYWORD_BACKEND:-opensearch}
      CODING_RAG_ES_URL: ${CODING_RAG_ES_URL:-http://opensearch:9200}
      CODING_RAG_ES_API_KEY: ${CODING_RAG_ES_API_KEY:-}
      CODING_RAG_ES_INDEX_HARMONYOS: ${CODING_RAG_ES_INDEX_HARMONYOS:-codingrag_harmonyos_docs}
      CODING_RAG_ES_INDEX_IOS: ${CODING_RAG_ES_INDEX_IOS:-codingrag_ios_docs}
      CODING_RAG_DATABASE_URL: ${CODING_RAG_DATABASE_URL:-postgresql://codingrag:codingrag@postgres:5432/codingrag}
      CODING_RAG_STORAGE_BACKEND: ${CODING_RAG_STORAGE_BACKEND:-fastdfs}
      CODING_RAG_FASTDFS_TRACKER: ${CODING_RAG_FASTDFS_TRACKER:-fastdfs-tracker:22122}
      CODING_RAG_FASTDFS_DOWNLOAD_BASE_URL: ${CODING_RAG_FASTDFS_DOWNLOAD_BASE_URL:-http://fastdfs-storage:8888}
    depends_on:
      - qdrant
      - opensearch
      - postgres
      - fastdfs-tracker
      - fastdfs-storage
    restart: unless-stopped


  postgres:
    platform: linux/amd64
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-codingrag-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codingrag}
      POSTGRES_USER: ${POSTGRES_USER:-codingrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codingrag}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    restart: unless-stopped

  fastdfs-tracker:
    platform: linux/amd64
    image: ${FASTDFS_IMAGE:-delron/fastdfs:latest}
    container_name: ${FASTDFS_TRACKER_CONTAINER_NAME:-codingrag-fastdfs-tracker}
    command: tracker
    ports:
      - "${FASTDFS_TRACKER_PORT:-22122}:22122"
    volumes:
      - ${FASTDFS_TRACKER_DATA_DIR:-./data/fastdfs/tracker}:/var/fdfs
    restart: unless-stopped

  fastdfs-storage:
    platform: linux/amd64
    image: ${FASTDFS_IMAGE:-delron/fastdfs:latest}
    container_name: ${FASTDFS_STORAGE_CONTAINER_NAME:-codingrag-fastdfs-storage}
    command: storage
    environment:
      TRACKER_SERVER: ${FASTDFS_TRACKER_SERVER:-fastdfs-tracker:22122}
    ports:
      - "${FASTDFS_STORAGE_PORT:-23000}:23000"
      - "${FASTDFS_HTTP_PORT:-8888}:8888"
    volumes:
      - ${FASTDFS_STORAGE_DATA_DIR:-./data/fastdfs/storage}:/var/fdfs
    depends_on:
      - fastdfs-tracker
    restart: unless-stopped

  qdrant:
    platform: linux/amd64
    image: qdrant/qdrant:v1.15.3
    container_name: ${QDRANT_CONTAINER_NAME:-codingrag-qdrant}
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-codingrag-qdrant-secret}
    volumes:
      - ${QDRANT_STORAGE_DIR:-./data/qdrant}:/qdrant/storage
    restart: unless-stopped

  opensearch:
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/opensearch/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    image: ${OPENSEARCH_IMAGE:-codingrag-opensearch-ik:2.19.1}
    container_name: ${OPENSEARCH_CONTAINER_NAME:-codingrag-opensearch}
    ports:
      - "${OPENSEARCH_HTTP_PORT:-9200}:9200"
      - "${OPENSEARCH_PERF_PORT:-9600}:9600"
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${OPENSEARCH_DATA_DIR:-./data/opensearch}:/usr/share/opensearch/data
    restart: unless-stopped
